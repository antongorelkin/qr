<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="./index.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
			rel="stylesheet" />
		<title>QR-code</title>
	</head>
	<body>
		<main>
			<div class="container">
				<article class="qr-container" aria-labelledby="qr-title">
					<div class="content">
						<a
							href="https://www.frontendmentor.io"
							class="qr-link"
							target="_blank"
							rel="noopener noreferrer"
							aria-label="Visit Frontend Mentor to improve your front-end skills (opens in a new tab)">
							<img
								src="./img/image-qr-code.png"
								class="qr-image"
								width="288"
								height="288"
								alt="QR code to Frontend Mentor website" />
						</a>
						<section class="text-content">
							<h2 class="qr-title">
								Improve your front-end skills by building projects
							</h2>
							<p class="qr-dscr">
								Scan the QR code to visit Frontend Mentor and take your coding
								skills to the next level
							</p>
						</section>
					</div>
				</article>
			</div>
		</main>
	</body>
</html>
