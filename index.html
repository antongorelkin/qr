<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="./index.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
			rel="stylesheet" />
		<title>QR-code</title>
	</head>
	<body>
		<main>
			<div class="container">
				<div class="qr-container">
					<div class="content">
						<figure class="qr-figure">
							<!-- If the whole figure is clickable, wrap the image only OR the entire figure in an anchor.
           Here we wrap the image so the caption remains readable and accessible. -->
							<a
								href="https://www.frontendmentor.io"
								class="qr-link"
								target="_blank"
								rel="noopener noreferrer">
								<img
									src="image.png"
									alt="QR code linking to Frontend Mentor"
									class="qr-image" />
							</a>
							<!-- Figcaption provides a semantic caption associated with the image -->
							<figcaption class="qr-caption">
								Scan the QR to visit Frontend Mentor and improve your front-end
								skills.
							</figcaption>
						</figure>
						<section class="text-content">
							<h1 class="qr-title">
								Improve your front-end skills by building projects
							</h1>
							<p class="qr-dscr">
								Scan the QR code to visit Frontend Mentor and take your coding
								skills to the next level
							</p>
						</section>
					</div>
				</div>
			</div>
		</main>
	</body>
</html>
